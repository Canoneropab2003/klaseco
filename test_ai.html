<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLASECO | AI Debugger</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1f44; color: white; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-family: 'Fredoka', sans-serif; color: #ffd84d; margin-top: 0; }
        .status-card { display: flex; gap: 20px; margin-bottom: 20px; }
        .chip { padding: 8px 15px; border-radius: 99px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .idle { background: #546e7a; }
        .loading { background: #ff9800; animation: pulse 1s infinite; }
        .success { background: #00c853; }
        .error { background: #ff5252; }
        
        .log-box { background: #050f21; border-radius: 10px; padding: 20px; margin-top: 20px; min-height: 200px; border: 1px solid #1a3054; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 13px; color: #a9c3e4; line-height: 1.5; }
        .label { color: #ffd84d; font-weight: bold; margin-bottom: 10px; display: block; }
        
        button { background: linear-gradient(135deg,#ffd84d,#ffc120); border: none; padding: 15px 30px; border-radius: 99px; font-weight: 800; cursor: pointer; color: #0b1f44; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="container">
    <h1>KLASECO AI Debugger</h1>
    <p>Test the connection between your frontend and <code>api/ai_handler.php</code>.</p>

    <div class="status-card">
        <div id="status-chip" class="chip idle">Ready</div>
    </div>

    <button onclick="testAI()">Run Diagnostic Test</button>

    <div class="log-box">
        <span class="label">Response Output:</span>
        <pre id="output">Output will appear here after clicking the button...</pre>
    </div>
</div>

<script>
async function testAI() {
    const output = document.getElementById('output');
    const status = document.getElementById('status-chip');
    
    output.innerText = "Sending request...";
    status.innerText = "Processing...";
    status.className = "chip loading";

    try {
        const startTime = performance.now();

        // --- THE CHANGE IS HERE ---
        // We use URLSearchParams instead of JSON.stringify
        const params = new URLSearchParams();
        params.append('message', 'Who is absent today?');

        const res = await fetch('api/ai_handler.php', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/x-www-form-urlencoded' 
            },
            body: params
        });
        // --------------------------

        const endTime = performance.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);
        const data = await res.json();
        
        if (res.ok && !data.error) {
            status.innerText = `Success (${duration}s)`;
            status.className = "chip success";
            output.innerText = JSON.stringify(data, null, 4);
        } else {
            status.innerText = "PHP/AI Error";
            status.className = "chip error";
            output.innerText = JSON.stringify(data, null, 4);
        }
    } catch (err) {
        status.innerText = "Connection Failed";
        status.className = "chip error";
        output.innerText = "CRITICAL ERROR: " + err.message;
    }
}
</script>

</body>
</html>
